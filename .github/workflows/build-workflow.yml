name: wolfPKCS11 Build Workflow

on:

    workflow_call:
      inputs:
        config:
          required: false
          type: string
        check:
          required: false
          type: string
          default: 'make check'
        wolfssl_lms:
          description: 'wolfSSL LMS configure flag (small|verify-only|<empty for full>)'
          required: false
          type: string
          default: 'small'
        wolfssl_lms_levels:
          description: 'WOLFSSL_LMS_MAX_LEVELS to compile wolfSSL with'
          required: false
          type: string
          default: '2'
        wolfssl_lms_height:
          description: 'WOLFSSL_LMS_MAX_HEIGHT to compile wolfSSL with'
          required: false
          type: string
          default: '10'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
#pull wolfPKCS11
    - uses: actions/checkout@v4
      with:
        submodules: true

#setup wolfssl
    - uses: actions/checkout@v4
      with:
        repository: wolfssl/wolfssl
        path: wolfssl
    - name: wolfssl autogen
      working-directory: ./wolfssl
      run: ./autogen.sh
    - name: wolfssl configure
      working-directory: ./wolfssl
      run: |
        LMS_FLAG="--enable-lms"
        if [ -n "${{ inputs.wolfssl_lms }}" ]; then
          LMS_FLAG="--enable-lms=${{ inputs.wolfssl_lms }}"
        fi
        ./configure --enable-cryptocb --enable-aescfb --enable-rsapss --enable-keygen --enable-pwdbased --enable-scrypt --enable-md5 \
            --enable-mldsa $LMS_FLAG \
            C_EXTRA_FLAGS="-DWOLFSSL_PUBLIC_MP -DWC_RSA_DIRECT -DHAVE_AES_ECB -DHAVE_AES_KEYWRAP -DWOLFSSL_LMS_MAX_LEVELS=${{ inputs.wolfssl_lms_levels }} -DWOLFSSL_LMS_MAX_HEIGHT=${{ inputs.wolfssl_lms_height }}"
    - name: wolfssl make install
      working-directory: ./wolfssl
      run: make
    - name: wolfssl make install
      working-directory: ./wolfssl
      run: |
          sudo make install
          sudo ldconfig

#setup ibmswtpm2
    - uses: actions/checkout@v4
      with:
        repository: kgoldman/ibmswtpm2
        path: ibmswtpm2
    - name: ibmswtpm2 make
      working-directory: ./ibmswtpm2/src
      run: |
          make
          ./tpm_server &

#setup wolftpm
    - uses: actions/checkout@v4
      with:
        repository: wolfssl/wolftpm
        path: wolftpm
    - name: wolftpm autogen
      working-directory: ./wolftpm
      run: ./autogen.sh
    - name: wolftpm configure
      working-directory: ./wolftpm
      run: |
        ./configure --enable-swtpm
    - name: wolftpm make install
      working-directory: ./wolftpm
      run: make
    - name: wolftpm make install
      working-directory: ./wolftpm
      run: |
          sudo make install
          sudo ldconfig

#setup wolfPKCS11
    - name: wolfpkcs11 autogen
      run: ./autogen.sh
    - name: wolfpkcs11 configure
      run: ./configure ${{inputs.config}}
    - name: wolfpkcs11 make
      run: make
    - name: wolfpkcs11 make check
      run: ${{inputs.check}}
    - name: wolfpkcs11 make install
      run: sudo make install
    - name: wolfpkcs11 make dist
      run: make dist


# capture logs on failure
    - name: Upload failure logs
      if: failure() || cancelled()
      uses: actions/upload-artifact@v4
      with:
        name: wolfpkcs11-test-logs
        path: |
          test-suite.log
        retention-days: 5
